name: ML pipeline tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (lightweight subset — sem TensorFlow/emlearn)
        # ml/requirements.txt inclui TensorFlow/emlearn para o LSTM
        # Autoencoder/footprint TinyML (pesados, minutos por execução,
        # produzem artefactos versionados manualmente — ver
        # PROJECT_STATUS.md, "ainda por fazer" desta secção, e
        # ml/tests/test_train_smoke.py). scikit-learn/xgboost foram
        # adicionados (2026-07-08) para o teste de fumo dos scripts de
        # treino do classificador de atividades (test_train_smoke.py) —
        # bem mais leves que TensorFlow, instalação em segundos.
        run: pip install numpy pandas scikit-learn xgboost pytest

      - name: Run pytest (ml/tests)
        working-directory: ml
        run: python -m pytest tests/ -v
