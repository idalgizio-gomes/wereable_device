name: Bridge Python tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bridge/requirements_db.txt

      - name: Install dependencies
        run: pip install -r bridge/requirements_db.txt

      - name: Run pytest (bridge/tests)
        working-directory: bridge
        run: python -m pytest tests/ -v
