; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed-xiao-afruitnrf52-nrf52840-sense-plus]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense-plus
framework = arduino

; Velocidade monitor serial
monitor_speed = 115200

; Bibliotecas necessárias
lib_deps =
    seeed-studio/Seeed Arduino LSM6DS3
	sparkfun/SparkFun u-blox GNSS Arduino Library
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
    adafruit/Adafruit SSD1351 library
    adafruit/Adafruit GFX Library
	jgromes/RadioLib
    rweather/Crypto
    adafruit/Adafruit SPIFlash



; Configuração I2C (fix para Xiao)
build_flags =
    -DARDUINO_ARCH_NRF52
    -DUSE_TINYUSB
    ;-DPIN_WIRE_SDA=4
    ;-DPIN_WIRE_SCL=5

; Upload settings
upload_protocol = nrfutil

; BUG CORRIGIDO (2026-07-03): sem isto, o ambiente principal também
; compilava src/test_lora_isolated.cpp (que tem o seu próprio
; setup()/loop()), causando "multiple definition of setup/loop" e
; falha total do build principal — confirmado no primeiro build a
; seguir a adicionar o ambiente de teste isolado abaixo.
build_src_filter = +<*> -<test_lora_isolated.cpp>

; ------------------------------------------------------------
; Ambiente de teste isolado do LoRa (2026-07-03, pedido do utilizador:
; "testar cada parâmetro individualmente antes do código completo").
; Compila SÓ src/test_lora_isolated.cpp (exclui main.cpp e todos os
; outros módulos do firmware principal — build_src_filter garante que
; não há dois setup()/loop() a competir). Uso:
;   pio run -e test_lora_isolated -t upload
; ------------------------------------------------------------
[env:test_lora_isolated]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense-plus
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<test_lora_isolated.cpp>
build_flags =
    -DARDUINO_ARCH_NRF52
    -DUSE_TINYUSB
upload_protocol = nrfutil
